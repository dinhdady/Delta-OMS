<div class="login-page fade-in">
  <!-- LEFT - Sports Branding -->
  <div class="left">
    <div class="sports-badge">
      <div class="sport-icon">⚡</div>
      <div class="sport-icon">🏃</div>
      <div class="sport-icon">⚽</div>
    </div>
    <h1>Sports<span>Hub</span></h1>
    <p class="tagline">Ultimate Sports Equipment Management</p>
    <div class="features">
      <div class="feature">
        <span>🏆</span>
        <span>Inventory Excellence</span>
      </div>
      <div class="feature">
        <span>📊</span>
        <span>Real-time Analytics</span>
      </div>
      <div class="feature">
        <span>🚀</span>
        <span>Performance Tracking</span>
      </div>
    </div>
  </div>

  <!-- RIGHT - Login Section -->
  <div class="right">
    <div class="login-card slide-up" [class.shake]="errorMessage">
      <div class="card-header">
        <div class="welcome-icon">🏅</div>
        <h2>Welcome Back</h2>
        <p>Sign in to manage your sports equipment</p>
      </div>

      <form (ngSubmit)="login()">
        <div class="form-group">
          <label>
            <span>👤</span>
            Username or Email
          </label>
          <input
            [(ngModel)]="username"
            name="username"
            placeholder="Enter your username or email"
            required />
        </div>

        <div class="form-group">
          <label>
            <span>🔒</span>
            Password
          </label>
          <div class="password-input">
            <input
              [(ngModel)]="password"
              name="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Enter your password"
              required />
            <button
              type="button"
              class="toggle-password"
              (click)="togglePasswordVisibility()">
              {{ showPassword ? '👁️' : '👁️‍🗨️' }}
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn" [disabled]="loading">
          <span *ngIf="!loading">Sign In</span>
          <div *ngIf="loading" class="spinner"></div>
          <span class="btn-icon" *ngIf="!loading">→</span>
        </button>

        <div class="demo-credentials">
          <p>Demo Credentials:</p>
          <code>admin / sports2024</code>
        </div>
      </form>

      <div class="error" *ngIf="errorMessage">
        <span>⚠️</span>
        {{ errorMessage }}
      </div>
    </div>
  </div>
</div>
