spring:
  application:
    name: management-system
  datasource:
    url: jdbc:mysql://localhost:3306/management_system   # URL kết nối đến database
    username: root                          # Tên đăng nhập
    password: 123456789                                 # Mật khẩu
    driver-class-name: com.mysql.cj.jdbc.Driver       # Lớp driver (thường có thể để Spring Boot tự động phát hiện)
  jpa:
    # Các cấu hình liên quan đến JPA/Hibernate
    hibernate:
      ddl-auto: update                                 # Tự động cập nhật schema (chỉ nên dùng cho phát triển)
    show-sql: true                                      # Hiển thị câu lệnh SQL trên console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect  # Dialect cho MySQL 8
  profiles:
    active: dev